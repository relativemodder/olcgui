name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Run type check
        run: bun run check

      - name: Clone OlcRTC for tests
        run: git clone https://github.com/openlibrecommunity/olcrtc

      - name: Run tests
        run: bun test

      - name: Build project
        run: bun run build

      - name: Build web image
        run: docker build --target web -t olcgui-web .

      - name: Build api image
        run: docker build --target api -t olcgui-api .
