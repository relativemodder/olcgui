name: Deployer CI/CD

on:
  push:
    branches: [main, master]
    tags: ['deployer-v*']
  pull_request:
    branches: [main, master]
    paths: ['deployer/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl
        working-directory: deployer

      - name: Prepare binary
        working-directory: deployer
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/deployer dist/deployer-x86_64-unknown-linux-musl
          cd dist
          sha256sum deployer-x86_64-unknown-linux-musl > deployer-x86_64-unknown-linux-musl.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployer-x86_64-unknown-linux-musl
          path: deployer/dist/*
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployer-x86_64-unknown-linux-musl

      - name: Generate release body
        run: |
          echo "## deployer ${{ github.ref_name }}" > release_body.md
          echo "" >> release_body.md
          echo "### Checksums" >> release_body.md
          echo '```' >> release_body.md
          cat *.sha256 >> release_body.md
          echo '```' >> release_body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            deployer-x86_64-unknown-linux-musl
            deployer-x86_64-unknown-linux-musl.sha256
