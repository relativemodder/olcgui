<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<style>
			::-webkit-scrollbar {
				width: 10px;
				height: 10px;
			}
			::-webkit-scrollbar-track {
				background: var(--ui-bg, #232629);
			}
			::-webkit-scrollbar-thumb {
				background: var(--ui-surface-strong, #4b5359);
				border-radius: 0;
			}
			::-webkit-scrollbar-thumb:hover {
				background: var(--ui-muted, #bdc3c7);
			}
			::-webkit-scrollbar-corner {
				background: var(--ui-bg, #232629);
			}
			* {
				scrollbar-width: thin;
				scrollbar-color: var(--ui-surface-strong, #4b5359) var(--ui-bg, #232629);
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			const legacyWorkerCleanupKey = 'olcgui:legacy-service-worker-cleaned';

			function cleanupLegacyCaches() {
				if (!('caches' in window)) {
					return Promise.resolve();
				}

				return caches
					.keys()
					.then((names) =>
						Promise.all(
							names
								.filter((name) => name.startsWith('precache-') || name.startsWith('runtime-'))
								.map((name) => caches.delete(name))
						)
					)
					.then(() => undefined);
			}

			if ('serviceWorker' in navigator) {
				window.addEventListener('load', async () => {
					try {
						const registration = await navigator.serviceWorker.getRegistration('/');
						const hadRegistration = Boolean(registration);

						await registration?.unregister();
						await cleanupLegacyCaches();

						if (
							hadRegistration &&
							navigator.serviceWorker.controller &&
							sessionStorage.getItem(legacyWorkerCleanupKey) !== '1'
						) {
							sessionStorage.setItem(legacyWorkerCleanupKey, '1');
							window.location.reload();
							return;
						}

						sessionStorage.removeItem(legacyWorkerCleanupKey);
					} catch {
						// Ignore cleanup failures; the app should still load normally.
					}
				});
			} else {
				cleanupLegacyCaches().catch(() => undefined);
			}
		</script>
	</body>
</html>
