services:
  olcgui:
    build: .
    container_name: olcgui-manager
    ports:
      - '5173:5173'
      - '8808:8808' # default SOCKS5 port for client-mode tunnels
    volumes:
      - ./data:/app/data # persists DB and instance configs
      - ./olcrtc:/app/olcrtc # olcrtc repo and compiled binary
    environment:
      - DATABASE_URL=/app/data/sqlite.db
      - OLCRTC_DATA_DIR=/app/data/instances
      - OLCRTC_BINARY_PATH=/app/olcrtc/build/olcrtc-linux-amd64
      - OLCRTC_GIT_DIR=/app/olcrtc
      - OLCRTC_BUILD_DIR=/app/olcrtc
      - MAGE_CMD=mage
    restart: unless-stopped
