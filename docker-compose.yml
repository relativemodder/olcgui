services:
  api:
    image: olcgui-api
    build:
      context: .
      target: api
    expose:
      - '3001'
    ports:
      - '8800-8820:8800-8820' # default SOCKS5 port range for client-mode tunnels
    volumes:
      - ./data:/app/data:Z # persists DB and instance configs
      - ./olcrtc:/app/olcrtc:Z # olcrtc repo and compiled binary
    environment:
      DATABASE_URL: /app/data/sqlite.db
      OLCRTC_DATA_DIR: /app/data/instances
      OLCRTC_GIT_DIR: /app/olcrtc
      OLCRTC_BUILD_DIR: /app/olcrtc
      OLCRTC_GIT_REMOTE_URL: https://github.com/openlibrecommunity/olcrtc
      MAGE_CMD: mage
      BODY_SIZE_LIMIT: Infinity
      API_HOST: 0.0.0.0
      API_PORT: 3001
    restart: unless-stopped

  web:
    image: olcgui-web
    build:
      context: .
      target: web
    ports:
      - '5173:5173'
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      API_BACKEND_URL: http://api:3001
    depends_on:
      - api
    restart: unless-stopped
